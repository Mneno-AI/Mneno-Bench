services:
  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

  bench:
    build:
      context: .
      dockerfile: docker/bench/Dockerfile
    working_dir: /app
    command: python docker/bench/main.py --keep-alive
    environment:
      DATA_DIR: data
      RESULTS_DIR: results
      CONFIGS_DIR: configs
    volumes:
      - ./benchmarks:/app/benchmarks
      - ./data:/app/data
      - ./results:/app/results
      - ./configs:/app/configs
      - ./vendor:/app/vendor

volumes:
  web_node_modules:
